name: Build macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史与 tag 注释，供提取发版说明

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure skills directory exists
        run: mkdir -p app/skills

      - name: Build .app bundle
        run: pyinstaller main_mac.spec --clean

      - name: Create ZIP
        run: |
          cd dist
          zip -r ../QuickModel-mac-arm64.zip QuickModel.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickModel-mac
          path: QuickModel-mac-arm64.zip

      - name: Extract release notes from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        run: |
          # tag 消息整体就是发版说明（bump_version.py 用 --cleanup=whitespace 打 tag，
          # 保留 markdown 的 '#' 标题）。for-each-ref %(contents) 取完整消息正文。
          BODY=$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")
          if [ -z "$BODY" ]; then
            BODY="${GITHUB_REF_NAME} 发布。"
          fi
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: QuickModel-mac-arm64.zip
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
