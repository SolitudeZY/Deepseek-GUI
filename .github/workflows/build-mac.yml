name: Build macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai pywebview pyinstaller
          pip install tavily-python duckduckgo-search firecrawl-py || true
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit

      - name: Ensure skills directory exists
        run: mkdir -p app/skills

      - name: Build .app bundle
        run: pyinstaller main_mac.spec --clean

      - name: Create ZIP
        run: |
          cd dist
          zip -r ../QuickModel-mac-arm64.zip QuickModel.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickModel-mac
          path: QuickModel-mac-arm64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: QuickModel-mac-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
